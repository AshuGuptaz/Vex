services:
  vex:
    image: vex-server:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vex
    ports:
      - "8080:8080"
    volumes:
      - vex-data:/data
    environment:
      VEX_DATA_DIR: /data
      VEX_SERVER_PORT: "8080"
      VEX_WAL_FSYNC: "per-write"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  vex-data:
