server:
  port: ${VEX_SERVER_PORT:8080}

spring:
  application:
    name: vex
  jackson:
    default-property-inclusion: non_null
  mvc:
    log-resolved-exception: false

vex:
  data-dir: ${VEX_DATA_DIR:./data}
  wal-fsync: ${VEX_WAL_FSYNC:per-write}

logging:
  level:
    root: INFO
    com.vex: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
